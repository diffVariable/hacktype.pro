<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#221c24" />

  <!-- terminal card -->
  <rect x="80" y="70" width="1040" height="490" rx="22" fill="#2d2630" stroke="#3d3542" stroke-width="2" />
  <!-- title bar -->
  <path d="M80 92 a22 22 0 0 1 22 -22 h996 a22 22 0 0 1 22 22 v42 h-1040 z" fill="#352e38" />
  <line x1="80" y1="134" x2="1120" y2="134" stroke="#3d3542" stroke-width="2" />
  <circle cx="120" cy="102" r="9" fill="#d98a8a" />
  <circle cx="150" cy="102" r="9" fill="#d9c08a" />
  <circle cx="180" cy="102" r="9" fill="#93c39a" />
  <text x="220" y="108" font-family="'JetBrains Mono', monospace" font-size="22" fill="#6b5f70">operator@ghost - ~/intrusion</text>

  <!-- session lines -->
  <g font-family="'JetBrains Mono', monospace" font-size="27">
    <text x="120" y="200"><tspan fill="#9d8aa5">$ </tspan><tspan fill="#e89bb1">ssh ghost@target.local</tspan></text>
    <text x="120" y="244" fill="#6b5f70">  connection established</text>
    <text x="120" y="288"><tspan fill="#9d8aa5">$ </tspan><tspan fill="#e89bb1">./ghostmode --silent</tspan><tspan fill="#5a4f5f"> --no-trace</tspan></text>
    <text x="120" y="332" fill="#6b5f70">  identity masked. you are nobody</text>
    <text x="120" y="376"><tspan fill="#9d8aa5">$ </tspan><tspan fill="#e89bb1">cat /etc/shadow</tspan><tspan fill="#e89bb1">|</tspan></text>
  </g>

  <!-- logo + tagline -->
  <text x="120" y="486" font-family="'JetBrains Mono', monospace" font-size="46" font-weight="700"><tspan fill="#e89bb1">hack</tspan><tspan fill="#6b5f70">.</tspan><tspan fill="#e89bb1">type</tspan></text>
  <text x="120" y="524" font-family="'JetBrains Mono', monospace" font-size="24" fill="#c9b8ce">a typing speed test disguised as a hacker terminal</text>
  <text x="990" y="524" font-family="'JetBrains Mono', monospace" font-size="22" fill="#6b5f70">hacktype.pro</text>
</svg>
